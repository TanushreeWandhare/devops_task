apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-deployment
  labels:
    app: my-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-app                 
  template:
    metadata:  
      labels:
        app: my-app   
    spec:
      containers:     
        - name: d-pod
          image: tanushreew/devops:v1
          ports:
            - containerPort: 80
